<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S3 CSE // A214 // TIMETABLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/index.css">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
</head>
<body>

<div x-data="timetableApp()" x-init="init()" :class="examModeActive ? 'exam-active' : ''">

  <div class="wrap">

    <div x-show="!loaded" class="loading">[ LOADING SYSTEM ]</div>

    <template x-if="loaded">
      <div>
        <header>
          <div class="header-actions">
            <button class="header-btn" @click="toggleTheme" aria-label="Toggle theme" style="display:none">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button class="header-btn" id="installHeaderBtn" @click="showInstallBanner" aria-label="Install">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
          </div>
          <p class="eyebrow">// CSE DEPARTMENT // SEMESTER S3 // 2026–2027 //</p>
          <h1 x-text="isExamDay ? examTitle : 'CLASS TIMETABLE'"></h1>
          <div class="meta-row">
            <span class="meta-chip">[ ROOM: A214 ]</span>
            <span class="meta-chip">[ ADVISORS: SWEETY C JOY / PREEJA MOL ]</span>
          </div>
        </header>

        <div x-show="upcomingDeadlines.length">
          <p class="section-title">// URGENT TASKS //</p>
          <template x-for="ev in upcomingDeadlines" :key="eventKey(ev)">
            <div class="card card-event">
              <div class="card-inner">
                <div class="card-accent" :style="`background: ${ev.type === 'deadline' ? 'var(--neon-red)' : ev.type === 'test' ? 'var(--neon-yellow)' : 'var(--neon-cyan)'}`"></div>
                <div class="event-date">
                  <span x-text="new Date(ev.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})"></span>
                  <span class="day" x-text="ev.type"></span>
                </div>
                <div class="card-body">
                  <div class="card-info">
                    <p class="subj-name">>> <span x-text="ev.title + (ev.subject ? ' [' + ev.subject + ']' : '')"></span></p>
                    <div class="progress-wrap">
                      <div class="progress-track" :style="`background: var(--border)`">
                        <div class="progress-fill" :style="`width: ${eventProgressPct(ev)}%; background: ${ev.type === 'deadline' ? 'var(--neon-red)' : ev.type === 'test' ? 'var(--neon-yellow)' : 'var(--neon-cyan)'}`"></div>
                      </div>
                      <span class="progress-remaining" x-text="eventProgressLabel(ev)"></span>
                    </div>
                  </div>
                  <div x-show="ev.type === 'deadline' || ev.type === 'reminder'" style="flex:0 0 auto">
                    <button class="card-chip" :style="`border-color: ${isEventCompleted(ev) ? 'var(--neon-green)' : 'var(--neon-cyan)'}; color: ${isEventCompleted(ev) ? 'var(--neon-green)' : 'var(--neon-cyan)'}`"
                            @click.stop="toggleEventComplete(ev)" x-text="isEventCompleted(ev) ? '↩' : '[✓]'"></button>
                  </div>
                </div>
              </div>
            </div>
          </template>
          <p class="section-title" style="margin-top:20px">// SCHEDULE //</p>
        </div>

        <div x-show="examModeActive">
          <div class="exam-banner">&gt;&gt; EXAM MODE ACTIVE &lt;&lt;</div>
          <template x-for="ev in upcomingExams" :key="eventKey(ev)">
            <div class="card card-event">
              <div class="card-inner">
                <div class="card-accent" style="background:var(--neon-magenta)"></div>
                <div class="event-date">
                  <span x-text="new Date(ev.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})"></span>
                  <span class="day">EXAM</span>
                </div>
                <div class="card-body">
                  <div class="card-info">
                    <p class="subj-name">>> <span x-text="ev.title + (ev.subject ? ' [' + ev.subject + ']' : '')"></span></p>
                    <div class="progress-wrap">
                      <div class="progress-track"><div class="progress-fill" :style="`width: ${eventProgressPct(ev)}%; background: var(--neon-magenta)`"></div></div>
                      <span class="progress-remaining" x-text="eventProgressLabel(ev)"></span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>

        <div class="panels" @touchstart="touchStart" @touchend="touchEnd">
          <template x-for="day in days" :key="day">
            <div x-show="currentDay === day" x-transition:enter="panel-enter">
              <template x-if="day === 'Exams'">
                <div>
                  <div x-show="!upcomingExams.length" class="empty-state">[ NO UPCOMING EXAMS ]</div>
                  <template x-for="ev in upcomingExams" :key="eventKey(ev)">
                    <div class="card card-event">
                      <div class="card-inner">
                        <div class="card-accent" style="background:var(--neon-magenta)"></div>
                        <div class="event-date">
                          <span x-text="new Date(ev.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})"></span>
                          <span class="day">EXAM</span>
                        </div>
                        <div class="card-body">
                          <div class="card-info">
                            <p class="subj-name">>> <span x-text="ev.title + (ev.subject ? ' [' + ev.subject + ']' : '')"></span></p>
                            <div class="progress-wrap">
                              <div class="progress-track"><div class="progress-fill" :style="`width: ${eventProgressPct(ev)}%; background: var(--neon-magenta)`"></div></div>
                              <span class="progress-remaining" x-text="eventProgressLabel(ev)"></span>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>

              <template x-if="day !== 'Exams'">
                <div>
                  <div x-show="showSaturdayCaution(day)" class="caution">
                    ⚠ NO CLASSES THIS SATURDAY — 1ST &amp; 3RD SATURDAYS ONLY
                  </div>
                  <div x-show="!SCHEDULE || !SCHEDULE[day] || !SCHEDULE[day].length" class="empty-state">[ NO CLASSES ]</div>

                  <template x-for="p in getSchedule(day)" :key="periodKey(p)">
                    <div>
                      <div x-show="p[2] === 'BREAK'" class="card card-break"
                           :class="{ 'card-break-now': isClassDay(day) && isOngoing(p[0], p[1]) }">
                        <div class="card-inner">
                          <div class="card-body">
                            <div class="card-info">
                              <p class="subj-name" x-show="isClassDay(day) && isOngoing(p[0], p[1])">
                                <span class="now-tag" style="background:var(--neon-cyan);color:var(--bg)">BREAK</span>
                              </p>
                              <p class="subj-name">☕ BREAK</p>
                              <p class="subj-sub" x-text="p[3] + ' FREE'"></p>
                              <div x-show="isClassDay(day) && isOngoing(p[0], p[1])" class="progress-wrap">
                                <div class="progress-track">
                                  <div class="progress-fill" style="background:var(--neon-cyan)"></div>
                                </div>
                                <span class="progress-remaining" x-text="progressLabel(p[0], p[1])"></span>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>

                      <div x-show="p[2] !== 'BREAK'" class="card"
                           :class="{ 'card-now': isClassDay(day) && isOngoing(p[0], p[1]) }"
                           :data-subj="p[2]"
                           :data-end-min="minutesOf(p[1])"
                           :style="`border-color: ${isClassDay(day) && isOngoing(p[0], p[1]) ? neonColors(p[2]).accent : ''}`">
                        <div class="card-inner">
                          <div class="card-accent" :style="cardAccentStyle(p[2])"></div>
                          <div class="card-body">
                            <div class="card-info">
                              <div class="card-time">
                                <span x-text="formatTime(p[0])"></span><span class="sep">//</span><span x-text="formatTime(p[1])"></span>
                              </div>
                              <p x-show="isClassDay(day) && isOngoing(p[0], p[1])" class="now-tag" :style="`background:${neonColors(p[2]).accent};color:var(--bg)`">LIVE</p>
                              <p class="subj-name">
                                <span x-text="subjectName(p[2])"></span>
                                <span x-show="p[3]" style="font-weight:400;color:var(--ink-faint);font-size:11px" x-text="'(' + p[3] + ')'"></span>
                              </p>
                              <p class="subj-sub" x-html="subjectLine(p[2])"></p>
                              <div x-show="isClassDay(day) && isOngoing(p[0], p[1])" class="progress-wrap">
                                <div class="progress-track">
                                  <template x-for="pos in dividerPositions(p[2], p[4] || 1)" :key="pos">
                                    <div class="progress-divider" :style="`left: ${pos}%; --card-accent: ${neonColors(p[2]).accent}`"
                                         :class="{ 'passed': progressPercent(p[0], p[1]) >= pos }"></div>
                                  </template>
                                  <div class="progress-fill" :style="`width: ${progressPercent(p[0], p[1])}%; background: ${neonColors(p[2]).accent}`"></div>
                                </div>
                                <span class="progress-remaining" x-text="progressLabel(p[0], p[1])"></span>
                              </div>
                            </div>
                            <div class="card-chip" :style="`border-color: ${neonColors(p[2]).accent}; color: ${neonColors(p[2]).text}`"
                                 x-text="subjectChip(p[2])"></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>

        <p class="section-title">// SUBJECTS &amp; FACULTY //</p>
        <div class="legend">
          <template x-for="item in LEGEND" :key="item[0]">
            <div class="legend-item">
              <span class="legend-dot" :style="`background: ${neonColors(item[0]).accent}; color: ${neonColors(item[0]).accent}`"></span>
              <div>
                <b x-text="item[1]"></b>
                <span x-text="item[2]"></span>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>

  <template x-if="loaded">
    <nav class="tabs">
      <template x-for="day in days" :key="day">
        <button class="tab"
                :class="{ 'active': currentDay === day, 'today': day === currentDayName && day !== 'Exams' }"
                @click="selectDay(day)">
          <span x-text="day === 'Exams' ? 'EXM' : day.slice(0,3).toUpperCase()"></span>
        </button>
      </template>
    </nav>
  </template>

  <div class="install-banner" :class="{ 'visible': installVisible }">
    <div class="install-backdrop" @click="hideInstallBanner"></div>
    <div class="install-card">
      <button class="install-close" @click="hideInstallBanner">&times;</button>
      <strong>INSTALL TIMETABLE</strong>
      <span>Add to home screen for quick access</span>
      <button class="install-btn" @click="doInstall" x-text="_deferredPrompt ? 'INSTALL' : (isIOS ? 'USE SHARE → ADD TO HOME' : 'OPEN IN CHROME')"></button>
    </div>
  </div>

</div>

<script src="js/timetable.js"></script>
<script src="js/features.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js" crossorigin="anonymous"></script>

</body>
</html>
