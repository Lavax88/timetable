<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADMIN // TIMETABLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div x-data="adminApp()" x-init="init()">

  <div class="wrap">

    <header style="padding-top:36px">
      <div class="header-actions">
        <a href="index.html" class="header-btn" style="text-decoration:none;display:flex;align-items:center;justify-content:center;font-size:14px">&lt;&lt;</a>
      </div>
      <h1 style="font-size:26px">ADMIN TERMINAL</h1>
      <p class="eyebrow">// KTU S3 CSE // EVENT CONTROL //</p>
    </header>

    <div class="card" style="padding:20px;margin-bottom:20px">
      <h2 style="font-size:14px;font-weight:600;margin:0 0 12px;text-transform:uppercase;letter-spacing:0.1em">&gt;&gt; EVENT UPLINK &lt;&lt;</h2>

      <div id="lockScreen" x-show="!unlocked">
        <p style="font-size:11px;color:var(--ink-soft);margin:0;text-transform:uppercase;letter-spacing:0.05em">Enter access code to proceed</p>
        <input type="password" x-model="password" placeholder="ACCESS CODE" class="input-field" @keyup.enter="unlock">
        <button class="btn btn-accent" @click="unlock" style="text-align:center">AUTHENTICATE</button>
      </div>

      <div id="eventBuilder" x-show="unlocked" style="display:flex;flex-direction:column;gap:10px">
        <p style="font-size:10px;color:var(--ink-faint);margin:0;text-transform:uppercase;letter-spacing:0.1em">// Single Events //</p>

        <div id="normalFields" style="display:flex;flex-direction:column;gap:10px">
          <div id="eventRows" style="display:flex;flex-direction:column;gap:8px">
            <template x-for="(row, i) in eventRows" :key="row._id">
              <div class="event-row">
                <select class="input-field event-type" x-model="row.type">
                  <option value="test">TEST</option>
                  <option value="deadline">DEADLINE</option>
                  <option value="general">GENERAL</option>
                  <option value="reminder">REMINDER</option>
                </select>
                <select class="input-field event-subject" x-model="row.subject">
                  <option value="">— NONE —</option>
                  <template x-for="s in subjectOptions()" :key="s.key">
                    <option :value="s.name" x-text="s.name.toUpperCase()"></option>
                  </template>
                </select>
                <input type="text" class="input-field event-title" x-model="row.title" placeholder="TITLE">
                <input type="date" class="input-field event-date" x-model="row.date">
                <button type="button" class="remove-btn" @click="removeEventRow(row._id)" x-show="eventRows.length > 1">✕</button>
              </div>
            </template>
          </div>
          <button type="button" class="add-row-btn" @click="addEventRow">+ ADD EVENT</button>
        </div>

        <hr style="border:none;border-top:1px solid var(--border);margin:6px 0">

        <p style="font-size:10px;color:var(--ink-faint);margin:0;text-transform:uppercase;letter-spacing:0.1em">// Exam Series //</p>
        <input type="text" x-model="seriesGlobalName" class="input-field" placeholder="SERIES TITLE (OPTIONAL)">

        <div id="seriesRows" style="display:flex;flex-direction:column;gap:8px">
          <template x-for="(row, i) in seriesRows" :key="row._id">
            <div class="series-row">
              <input type="text" class="input-field series-name" :value="'EXAM'" disabled style="opacity:0.5;flex:0 0 80px">
              <select class="input-field series-subject" x-model="row.subject" required>
                <option value="" disabled>SUBJECT</option>
                <template x-for="s in subjectOptions()" :key="s.key">
                  <option :value="s.name" x-text="s.name.toUpperCase()"></option>
                </template>
              </select>
              <input type="date" class="input-field series-date" x-model="row.date">
              <button type="button" class="remove-btn" @click="removeSeriesRow(row._id)" x-show="seriesRows.length > 1">✕</button>
            </div>
          </template>
        </div>
        <button type="button" class="add-row-btn" @click="addSeriesRow">+ ADD DATE</button>

        <button class="btn btn-accent" @click="submitEvents" style="text-align:center;padding:14px;font-size:13px">UPLOAD EVENTS</button>
      </div>

      <p id="status" x-show="statusMsg" :style="{ color: statusType === 'danger' ? 'var(--neon-red)' : 'var(--neon-green)' }" x-text="statusMsg" style="margin-top:14px;font-weight:600;text-align:center;font-size:11px"></p>
    </div>

    <div class="card" style="padding:20px;margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="font-size:14px;font-weight:600;margin:0;text-transform:uppercase;letter-spacing:0.1em">&gt;&gt; ACTIVE EVENTS &lt;&lt;</h2>
        <button class="btn btn-danger" @click="clearAllEvents" style="font-size:10px">ERASE ALL</button>
      </div>
      <div id="eventsList" style="min-height:40px">
        <div x-show="!activeEvents.length" style="color:var(--ink-faint);font-size:12px;padding:8px 0;text-transform:uppercase;letter-spacing:0.05em">[ NO EVENTS ]</div>
        <template x-for="ev in activeEvents" :key="ev.title + ev.date">
          <div class="event-item">
            <div class="event-item-info">
              <strong x-text="ev.title.toUpperCase()"></strong>
              <span x-text="new Date(ev.date).toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' })"></span>
              <span style="display:inline-block;margin-left:6px;font-size:10px;font-weight:600;padding:1px 6px;border:1px solid currentColor"
                    :style="`color: ${eventStatusColor(ev.type)}`"
                    x-text="eventTypeLabel(ev.type)"></span>
              <span x-show="ev.subject" style="color:var(--ink-faint);font-size:10px;margin-left:4px" x-text="'[' + ev.subject.toUpperCase() + ']'"></span>
            </div>
            <button class="remove-btn" @click="deleteEvent(ev)">✕</button>
          </div>
        </template>
      </div>
    </div>

    <div class="card" style="padding:20px;margin-bottom:20px">
      <h2 style="font-size:14px;font-weight:600;margin:0 0 12px;text-transform:uppercase;letter-spacing:0.1em">&gt;&gt; HOLIDAYS &lt;&lt;</h2>
      <p style="font-size:10px;color:var(--ink-faint);margin:0 0 10px;text-transform:uppercase;letter-spacing:0.05em">Schedule paused on these dates</p>
      <div id="holidayForm">
        <input type="date" x-model="holidayDate" class="input-field">
        <button class="btn btn-success" @click="addHoliday" style="white-space:nowrap">ADD</button>
      </div>
      <div id="holidaysList">
        <div x-show="!holidays.length" style="color:var(--ink-faint);font-size:12px;text-transform:uppercase;letter-spacing:0.05em">[ NONE SET ]</div>
        <template x-for="h in holidays" :key="h">
          <div class="event-item" style="margin-top:6px">
            <span x-text="new Date(h).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'})" style="font-size:12px"></span>
            <button class="remove-btn" @click="removeHoliday(h)">✕</button>
          </div>
        </template>
      </div>
    </div>

    <div class="card" style="padding:20px;margin-bottom:20px">
      <div class="exam-toggle-row">
        <div>
          <label>> FORCE EXAM MODE</label>
          <span class="hint">Override — show exam timetable to all users</span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" x-model="examModeEnabled" @change="toggleExamMode">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

  </div>
</div>

<script src="js/admin.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js" crossorigin="anonymous"></script>

</body>
</html>
